name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint + tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project (dev extras)
        # Install only the dev tooling deps the CI run actually needs.
        # The full ML stack (torch, transformers, chromadb) is heavy and not
        # required for lint + smoke tests; modeling tests are skipped in CI.
        run: |
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Black (check only)
        run: black --check .

      - name: Mypy
        run: mypy src/

      - name: Pytest
        run: pytest -q
