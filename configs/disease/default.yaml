# Default config for the plant disease module (Phase 5 §D)
# Schema: src.disease.config.DiseaseConfig

backbone: efficientnet_b4
image_size: 380
pretrained: true
dropout_rate: 0.3

# Stage epoch budgets (Phase 5 prompt decision #11)
pretrain_epochs: 25            # PlantVillage pretraining
finetune_paddy_epochs: 20      # Paddy Doctor fine-tune
finetune_plantdoc_epochs: 30   # PlantDoc fine-tune
freeze_backbone_epochs: 3      # head warm-up at the start of each stage

# Optimisation
lr_head: 0.001                 # 1e-3
lr_backbone: 0.0001            # 1e-4 (10x lower than the head)
weight_decay: 0.0001
gradient_clip: 1.0
mixed_precision: true

# DataLoader
batch_size: 16                 # Colab T4 safe; auto_batch_size() may bump
num_workers: 2

# Reproducibility
seed: 42

# Legacy / dataset-derived
num_classes: null

augmentation:
  horizontal_flip_p: 0.5
  vertical_flip_p: 0.0
  rotation_limit: 15
  brightness_limit: 0.2
  contrast_limit: 0.2
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]
