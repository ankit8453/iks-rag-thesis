# Default config for the plant disease classifier.
# Schema: src.disease.config.DiseaseConfig
# Per master reference §10: EfficientNet-B4 on 38-class PlantVillage.

backbone: efficientnet_b4
num_classes: 38
image_size: 380
batch_size: 32
lr: 0.0001
epochs: 30
freeze_backbone_epochs: 5
seed: 42
pretrained: true

augmentation:
  horizontal_flip_p: 0.5
  vertical_flip_p: 0.0
  rotation_limit: 15
  brightness_limit: 0.2
  contrast_limit: 0.2
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]
