# Default config for the multi-task visual soil classifier.
# Schema: src.soil.config.SoilConfig
# Per master reference §11: VISUAL ONLY. Never predict NPK / pH / fertility.

backbone: efficientnet_b0
image_size: 224
batch_size: 32
lr: 0.0001
epochs: 40
seed: 42
pretrained: true

# Post-Phase-4 reconciliation (supervisor sign-off received):
# surface and cover dropped during the soil-parameter coverage audit.
# moisture renamed to moisture_appearance to match master plan §14.
multi_task_heads:
  - soil_type
  - moisture_appearance
  - texture

# Hard list of attributes the model is forbidden to predict.
# Adding to this list is fine; removing entries requires a supervisor sign-off.
disallowed_outputs:
  - npk
  - ph
  - fertility
  - organic_matter
  - chemical_composition

# Phantom-fs Indian deposit labels (the soil_type head's 7 classes).
# Verified against the upstream Phantom-fs/Soil-Classification-Dataset
# repo and the Sheth et al. 2025 paper. The Phase 4 prompt's mention
# of "Clay" and "Peat" was incorrect.
valid_soil_types:
  - Alluvial_Soil
  - Arid_Soil
  - Black_Soil
  - Laterite_Soil
  - Mountain_Soil
  - Red_Soil
  - Yellow_Soil

cross_region_validation: true
